<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>계단뿌셔클럽 · 26 봄시즌 현황판</title>
<style>
:root{--bg:#f4f5f7;--card:#fff;--text:#1a1a1a;--sub:#888;--green:#22c55e;--yellow:#eab308;--red:#ef4444;--blue:#3b82f6;--accent:#0C76F7}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);max-width:480px;margin:0 auto;padding:0 0 80px;min-height:100vh}
.header{background:linear-gradient(135deg,#0A5FCC,#0C76F7);color:#fff;padding:20px 16px 16px;text-align:center}
.header h1{font-size:15px;font-weight:600;opacity:.85;letter-spacing:1px}
.header h2{font-size:20px;font-weight:700;margin-top:4px}
.tabs{display:flex;background:#fff;border-bottom:1px solid #e5e7eb;position:sticky;top:0;z-index:10}
.tab{flex:1;padding:12px;text-align:center;font-size:14px;font-weight:600;color:var(--sub);cursor:pointer;border-bottom:2px solid transparent;transition:.2s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.content{padding:12px}
.card{background:var(--card);border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card-title{font-size:13px;font-weight:600;color:var(--sub);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.big-num{font-size:32px;font-weight:800;line-height:1.1}
.big-num span{font-size:16px;font-weight:500;color:var(--sub)}
.pct{font-size:24px;font-weight:700;color:var(--accent)}
.bar-wrap{background:#e5e7eb;border-radius:8px;height:10px;margin:10px 0 6px;overflow:hidden}
.bar-fill{height:100%;border-radius:8px;transition:width .6s ease}
.bar-green{background:linear-gradient(90deg,#0A5FCC,#0C76F7)}
.bar-blue{background:linear-gradient(90deg,#2563eb,#3b82f6)}
.subtitle{font-size:12px;color:var(--sub)}
table{width:100%;border-collapse:collapse;font-size:12px;margin-top:4px}
th{text-align:center;font-weight:600;color:var(--sub);padding:6px 4px;border-bottom:2px solid #e5e7eb;font-size:11px}
td{text-align:center;padding:7px 4px;border-bottom:1px solid #f3f4f6}
tr.current{background:#fef3c7;font-weight:600}
.s-green{color:var(--green)}
.s-yellow{color:var(--yellow)}
.s-red{color:var(--red);font-weight:600}
.s-wait{color:var(--sub)}
.badge{display:inline-block;padding:2px 6px;border-radius:6px;font-size:11px;font-weight:600}
.b-green{background:#dcfce7;color:#166534}
.b-yellow{background:#fef9c3;color:#854d0e}
.b-red{background:#fee2e2;color:#991b1b}
.cta{display:block;text-align:center;background:linear-gradient(135deg,#0A5FCC,#0C76F7);color:#fff;padding:14px;border-radius:12px;font-size:15px;font-weight:700;text-decoration:none;margin:16px 0 8px;box-shadow:0 2px 8px rgba(16,185,129,.3);border:none;width:100%;cursor:pointer;font-family:inherit}
.cta:active{transform:scale(.98)}
.team-group{margin-bottom:12px}
.team-label{font-size:13px;font-weight:700;margin-bottom:4px}
.team-list{font-size:12px;color:#555;line-height:1.6}
.loading{text-align:center;padding:60px 20px;color:var(--sub);font-size:14px}
.refresh-btn{position:fixed;bottom:16px;right:16px;width:48px;height:48px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:20px;box-shadow:0 2px 12px rgba(0,0,0,.2);cursor:pointer;z-index:20;display:flex;align-items:center;justify-content:center}
.refresh-btn:active{transform:scale(.9)}
.spin{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.hidden{display:none}
.updated{text-align:center;font-size:11px;color:var(--sub);padding:8px}
.dot{display:inline-block;width:10px;height:10px;border-radius:50%;vertical-align:middle}
.dot-green{background:#22c55e}
.dot-yellow{background:#eab308}
.dot-red{background:#ef4444}
.dot-wait{background:#d1d5db}
.guest-warn{background:#fee2e2}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);color:#fff;padding:12px 24px;border-radius:10px;font-size:13px;font-weight:500;z-index:100;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="header">
  <h1>계단뿌셔클럽</h1>
  <h2>'26 봄시즌 현황판</h2>
</div>

<div class="tabs">
  <div class="tab active" data-tab="editor">✍️ 에디터크루</div>
  <div class="tab" data-tab="conquest">🏔️ 정복크루</div>
</div>

<div id="editor" class="content">
  <div class="loading" id="loading-e">데이터를 불러오는 중...</div>
</div>

<div id="conquest" class="content hidden">
  <div class="loading" id="loading-c">데이터를 불러오는 중...</div>
</div>

<div class="toast" id="toast"></div>
<button class="refresh-btn" id="refreshBtn" title="새로고침">↻</button>
<div class="updated" id="updatedAt"></div>

<script>
const SHEET_ID = '1ht9h27o5bHTc4RaTazxMFHEjzOce3rFnugzqwGiscns';
const SEASON_START = new Date(2026, 2, 16); // 2026-03-16 (Mon)

document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.querySelectorAll('.content').forEach(c => c.classList.add('hidden'));
    document.getElementById(t.dataset.tab).classList.remove('hidden');
  });
});

async function fetchSheet(sheetName, range) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}&range=${encodeURIComponent(range)}`;
  const res = await fetch(url);
  const text = await res.text();
  const match = text.match(/setResponse\(([\s\S]+?)\);?\s*$/);
  if (!match) throw new Error('Parse error');
  const data = JSON.parse(match[1]);
  return data.table.rows.map(r => (r.c || []).map(c => c ? (c.v ?? '') : ''));
}

function num(v) {
  if (typeof v === 'number') return v;
  if (!v) return 0;
  return Number(String(v).replace(/,/g, '')) || 0;
}

function findRow(rows, test) {
  return rows.find(r => r && r[0] && test(String(r[0])));
}

function statusBadge(cls, text) {
  return `<span class="badge b-${cls}">${text}</span>`;
}

function parseStatus(s) {
  s = String(s || '');
  // Check by Unicode codepoint for cross-platform emoji reliability
  for (const ch of s) {
    const c = ch.codePointAt(0);
    if (c === 0x1F7E2) return { type:'green', cls:'s-green', html:'<span class="dot dot-green"></span>' };
    if (c === 0x1F7E1) return { type:'yellow', cls:'s-yellow', html:'<span class="dot dot-yellow"></span>' };
    if (c === 0x1F534) return { type:'red', cls:'s-red', html:'<span class="dot dot-red"></span>' };
    if (c === 0x23F3) return { type:'wait', cls:'s-wait', html:'<span class="dot dot-wait"></span>' };
  }
  // Fallback: check by emoji literal
  if (s.includes('🟢')) return { type:'green', cls:'s-green', html:'<span class="dot dot-green"></span>' };
  if (s.includes('🟡')) return { type:'yellow', cls:'s-yellow', html:'<span class="dot dot-yellow"></span>' };
  if (s.includes('🔴')) return { type:'red', cls:'s-red', html:'<span class="dot dot-red"></span>' };
  if (s.includes('⏳')) return { type:'wait', cls:'s-wait', html:'<span class="dot dot-wait"></span>' };
  return { type:'none', cls:'s-wait', html:'-' };
}

function getCurrentWeekNum() {
  const today = new Date();
  const diff = Math.floor((today - SEASON_START) / 86400000);
  return Math.max(1, Math.floor(diff / 7) + 1);
}

function getWeekDateRange(weekNum) {
  const s = new Date(SEASON_START);
  s.setDate(s.getDate() + (weekNum - 1) * 7);
  const e = new Date(s);
  e.setDate(e.getDate() + 6);
  const sm = s.getMonth()+1, sd = s.getDate();
  const em = e.getMonth()+1, ed = e.getDate();
  return sm === em ? `(${sm}/${sd}~${ed})` : `(${sm}/${sd}~${em}/${ed})`;
}

function copyInviteUrl() {
  const url = 'https://forms.staircrusher.club/invitation26ss';
  navigator.clipboard.writeText(url).then(() => {
    showToast('초대장 URL이 복사되었어요. 원하는 곳에 붙여넣으세요');
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = url;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('초대장 URL이 복사되었어요. 원하는 곳에 붙여넣으세요');
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── Conquest Dashboard ──
async function renderConquest() {
  const el = document.getElementById('conquest');
  try {
    const [summaryRows, rows] = await Promise.all([
      fetchSheet('정복크루 현황판', 'A1:E5'),
      fetchSheet('정복크루 현황판', 'A1:E100'),
    ]);

    const bigRow = findRow(summaryRows, t => t.includes('16,000')) || findRow(rows, t => t.includes('16,000'));
    const subtitleRow = findRow(summaryRows, t => t.startsWith('남은')) || findRow(rows, t => t.startsWith('남은'));
    const weekRows = rows.filter(r => r && /^\d+주차/.test(String(r[0])));
    const guestHeaderIdx = rows.findIndex(r => r && String(r[0]) === '장소');
    const guestRows = guestHeaderIdx >= 0
      ? rows.slice(guestHeaderIdx + 1).filter(r => r && /^\d+\/\d+/.test(String(r[0])))
      : [];

    const current = bigRow ? num(String(bigRow[0]).match(/([\d,]+)/)?.[1]) : 0;
    const target = 16000;
    const pct = target > 0 ? (current / target * 100) : 0;
    const subtitle = subtitleRow ? String(subtitleRow[0]) : '';

    // Weekly table — current week by date
    const curWeek = getCurrentWeekNum();
    let weeklyHtml = '';
    for (const r of weekRows) {
      const label = String(r[0]);
      const weekMatch = label.match(/^(\d+)주차/);
      const weekNum = weekMatch ? parseInt(weekMatch[1]) : 0;
      const dateRange = weekNum > 0 ? ' ' + getWeekDateRange(weekNum) : '';
      const st = parseStatus(r[4]);
      const isCurrent = weekNum === curWeek;
      const wTarget = num(r[1]) > 0 ? num(r[1]).toLocaleString() : '-';
      const wActual = num(r[2]) > 0 ? num(r[2]).toLocaleString() : '-';
      const cumul = r[3] && num(r[3]) > 0 ? num(r[3]).toLocaleString() : '';
      const displayHtml = isCurrent && num(r[2]) < num(r[1]) ? '<span class="dot dot-wait"></span>' : st.html;
      weeklyHtml += `<tr class="${isCurrent ? 'current' : ''}">
        <td style="text-align:left;font-size:11px">${label}${dateRange}${isCurrent ? ' 👈' : ''}</td>
        <td>${wTarget}</td><td>${wActual}</td><td>${cumul}</td>
        <td>${displayHtml}</td></tr>`;
    }

    // Guest table
    let guestHtml = '';
    for (const r of guestRows) {
      const place = String(r[0]);
      const type = String(r[1] || '');
      const recruit = r[2];
      const applied = r[3];
      const status = String(r[4] || '');
      const st = parseStatus(status);
      let bCls = 'green';
      if (st.type === 'red') bCls = 'red';
      else if (st.type === 'yellow') bCls = 'yellow';
      const shortStatus = status.replace(/^[^\x00-\x7F]+\s*/, '').trim();
      const isWarn = /부족/.test(status);
      guestHtml += `<tr class="${isWarn ? 'guest-warn' : ''}">
        <td style="text-align:left">${place}</td><td>${type}</td>
        <td>${recruit}</td><td>${applied}</td>
        <td>${statusBadge(bCls, shortStatus || status)}</td></tr>`;
    }

    el.innerHTML = `
      <div class="card">
        <div class="card-title">🏔️ 시즌 정복량</div>
        <div style="display:flex;align-items:baseline;justify-content:space-between">
          <div class="big-num">${current.toLocaleString()} <span>/ ${target.toLocaleString()}</span></div>
          <div class="pct">${pct.toFixed(1)}%</div>
        </div>
        <div class="bar-wrap"><div class="bar-fill bar-green" style="width:${Math.min(pct,100)}%"></div></div>
        <div class="subtitle">${subtitle}</div>
      </div>
      <div class="card">
        <div class="card-title">📈 주차별 페이스</div>
        <table><tr><th style="text-align:left">주차</th><th>목표</th><th>달성</th><th>누적 달성</th><th>상태</th></tr>${weeklyHtml}</table>
      </div>
      <div class="card">
        <div class="card-title">🚨 게스트 모집 현황 <span style="font-weight:400;color:var(--sub)">(${guestRows.length}개 활동)</span></div>
        <table><tr><th style="text-align:left">장소</th><th>유형</th><th>모집</th><th>신청</th><th>상태</th></tr>${guestHtml}</table>
      </div>
      <button class="cta" onclick="copyInviteUrl()">친구 초대장 보내기 💚</button>
      <div style="text-align:center;font-size:12px;color:var(--sub);margin-top:4px">빈 자리가 외롭습니다... 친구 한 명이면 초록불로 변신!</div>`;
  } catch (e) {
    el.innerHTML = `<div class="loading">데이터를 불러올 수 없습니다.<br><small>${e.message}</small></div>`;
  }
}

// ── Editor Dashboard ──
async function renderEditor() {
  const el = document.getElementById('editor');
  try {
    const [summaryRows, rows] = await Promise.all([
      fetchSheet('에디터크루 현황판', 'A1:E6'),
      fetchSheet('에디터크루 현황판', 'A1:E35'),
    ]);

    const bigRow = findRow(summaryRows, t => t.includes('600')) || findRow(rows, t => t.includes('600'));
    const subtitleRow = findRow(summaryRows, t => t.startsWith('남은')) || findRow(rows, t => t.startsWith('남은'));
    const subtitle2Row = findRow(summaryRows, t => t.includes('원래 주당')) || findRow(rows, t => t.includes('원래 주당'));
    const weekRows = rows.filter(r => r && /^\d+주차/.test(String(r[0])));
    const encourageRow = findRow(rows, t => t.includes('마라톤') || t.includes('등속'));

    const current = bigRow ? num(String(bigRow[0]).match(/([\d,]+)/)?.[1]) : 0;
    const target = 600;
    const pct = target > 0 ? (current / target * 100) : 0;
    const subtitle = subtitleRow ? String(subtitleRow[0]) : '';
    const subtitle2 = subtitle2Row ? String(subtitle2Row[0]) : '';
    const encouragement = encourageRow ? String(encourageRow[0]) : '';

    let greenTeams = '', yellowTeams = '', redTeams = '';
    for (let i = 0; i < rows.length; i++) {
      const t = String(rows[i]?.[0] || '');
      if (t.includes('순조롭게') && rows[i+1]) greenTeams = String(rows[i+1][0] || '');
      if (t.includes('보통 속도') && rows[i+1]) yellowTeams = String(rows[i+1][0] || '');
      if (t.includes('아슬아슬') && rows[i+1]) redTeams = String(rows[i+1][0] || '');
    }

    let weeklyHtml = '';
    for (const r of weekRows) {
      const label = String(r[0]);
      const st = parseStatus(r[4]);
      const isCurrent = st.type === 'wait' && weekRows.indexOf(r) === weekRows.findIndex(w => parseStatus(w[4]).type === 'wait');
      const wActual = num(r[2]) > 0 ? num(r[2]).toLocaleString() : '-';
      const cumul = r[3] && num(r[3]) > 0 ? num(r[3]).toLocaleString() : '';
      weeklyHtml += `<tr class="${isCurrent ? 'current' : ''}">
        <td style="text-align:left;font-size:11px">${label}${isCurrent ? ' 👈' : ''}</td>
        <td>${r[1]}</td><td>${wActual}</td><td>${cumul}</td>
        <td>${st.html}</td></tr>`;
    }

    el.innerHTML = `
      <div class="card">
        <div class="card-title">✍️ 시즌 방문리뷰</div>
        <div style="display:flex;align-items:baseline;justify-content:space-between">
          <div class="big-num">${current.toLocaleString()} <span>/ ${target.toLocaleString()}</span></div>
          <div class="pct" style="color:var(--blue)">${pct.toFixed(1)}%</div>
        </div>
        <div class="bar-wrap"><div class="bar-fill bar-blue" style="width:${Math.min(pct,100)}%"></div></div>
        <div class="subtitle">${subtitle}</div>
        <div class="subtitle" style="margin-top:2px">${subtitle2}</div>
      </div>
      <div class="card">
        <div class="card-title">📈 주차별 리뷰 페이스</div>
        <table><tr><th style="text-align:left">주차</th><th>목표</th><th>실적</th><th>누적</th><th>상태</th></tr>${weeklyHtml}</table>
      </div>
      <div class="card" style="text-align:center;padding:12px 16px">
        <div style="font-size:14px;font-weight:600;color:var(--accent)">${encouragement}</div>
      </div>
      <div class="card">
        <div class="card-title">👥 우리 팀은 어디쯤?</div>
        <div class="team-group">
          <div class="team-label" style="color:var(--green)">🟢 순조롭게 달리는 팀</div>
          <div class="team-list">${greenTeams || '-'}</div>
        </div>
        <div class="team-group">
          <div class="team-label" style="color:#b45309">🟡 보통 속도로 가고 있는 팀</div>
          <div class="team-list">${yellowTeams || '-'}</div>
        </div>
        <div class="team-group" style="margin-bottom:0">
          <div class="team-label" style="color:var(--red)">🔴 아슬아슬한 긴장감을 즐기는 팀</div>
          <div class="team-list">${redTeams || '-'}</div>
        </div>
      </div>
      <div class="card" style="text-align:center">
        <div style="font-size:13px;color:var(--sub)">📝 1인당 주 1개 리뷰면 충분! 꾸준함이 최고의 무기 💪</div>
      </div>`;
  } catch (e) {
    el.innerHTML = `<div class="loading">데이터를 불러올 수 없습니다.<br><small>${e.message}</small></div>`;
  }
}

async function loadAll() {
  const btn = document.getElementById('refreshBtn');
  btn.innerHTML = '<span class="spin">↻</span>';
  await Promise.all([renderConquest(), renderEditor()]);
  btn.innerHTML = '↻';
  const now = new Date();
  document.getElementById('updatedAt').textContent =
    `마지막 업데이트: ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
}

document.getElementById('refreshBtn').addEventListener('click', loadAll);
loadAll();
setInterval(loadAll, 5 * 60 * 1000);
</script>
</body>
</html>
